<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Mơ - Digital SAT | Math Practice</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#0a0e1a",
                        surface: "#0f1420",
                        "surface-container": "#16192d",
                        "surface-container-high": "#1e2238",
                        "surface-container-highest": "#272d42",
                        "on-surface": "#e8ecf4",
                        "on-surface-variant": "#b3b9cc",
                        primary: "#4dd9cc",
                        "primary-dark": "#2fb5a3",
                        secondary: "#ff8fa3",
                        "success-green": "#1dd1a1",
                        outline: "#6b7290",
                        "border-light": "rgba(77, 217, 204, 0.15)"
                    },
                    borderRadius: {
                        md: "0.75rem",
                        lg: "1.5rem",
                        full: "9999px"
                    }
                }
            }
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e1a;
            color: #e8ecf4;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-card {
            background: rgba(22, 25, 45, 0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(77, 217, 204, 0.15);
        }

        .radio-button {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(77, 217, 204, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 200ms;
            background: transparent;
        }

        .radio-button:hover {
            border-color: #4dd9cc;
            box-shadow: 0 0 12px rgba(77, 217, 204, 0.2);
        }

        .radio-button:checked {
            border-color: #4dd9cc;
            background: #4dd9cc;
            box-shadow: 0 0 16px rgba(77, 217, 204, 0.3);
        }

        .radio-button:checked::after {
            content: '✓';
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: #001f1c;
            font-weight: bold;
        }

        .option-card {
            border: 1px solid rgba(77, 217, 204, 0.15);
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-card:hover {
            border-color: rgba(77, 217, 204, 0.3);
            background: rgba(22, 25, 45, 0.6);
        }

        .option-card.selected {
            border: 2px solid #4dd9cc;
            background: rgba(22, 25, 45, 0.8);
            box-shadow: 0 0 20px rgba(77, 217, 204, 0.15);
        }

        .option-card.marked {
            border-right: 4px solid #ffc857;
        }

        .transition-smooth {
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4dd9cc 0%, #5fe8db 100%);
            color: #001f1c;
            font-weight: 600;
            transition: all 200ms;
        }

        .btn-primary:hover {
            box-shadow: 0 0 24px rgba(77, 217, 204, 0.3);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(77, 217, 204, 0.1);
            color: #4dd9cc;
            border: 1px solid rgba(77, 217, 204, 0.3);
            font-weight: 600;
            transition: all 200ms;
        }

        .btn-secondary:hover {
            background: rgba(77, 217, 204, 0.2);
            border-color: #4dd9cc;
        }

        .progress-bar {
            background: rgba(77, 217, 204, 0.1);
            border-radius: 999px;
            overflow: hidden;
            height: 6px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4dd9cc 0%, #5fe8db 100%);
            height: 100%;
            transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(77, 217, 204, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
<div class="min-h-screen w-full py-8 px-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-on-surface">Section 2, Module 1: Math</h1>
                <p class="text-on-surface-variant mt-1">Practice & Lessons</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="glass-card px-4 py-2 rounded-full flex items-center gap-2 text-on-surface">
                    <span class="material-symbols-outlined">schedule</span>
                    <span class="font-semibold">35:00</span>
                </div>
                <button class="p-2 text-on-surface-variant hover:text-on-surface transition-smooth">
                    <span class="material-symbols-outlined">more_vert</span>
                </button>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="glass-card rounded-lg p-6 mb-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-on-surface">Progress</h3>
                <span class="text-sm text-on-surface-variant">Question 1 of 27</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 3.7%"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="glass-card rounded-lg p-8 mb-8">
            <div class="flex items-center gap-4 mb-6">
                <span class="text-lg font-bold text-primary">1</span>
                <div class="flex items-center gap-2 bg-primary/20 text-primary px-3 py-1 rounded-full">
                    <span class="material-symbols-outlined text-[16px]">bookmark</span>
                    <span class="text-xs font-semibold">MARK FOR REVIEW</span>
                </div>
            </div>

            <div class="mb-8">
                <p class="text-lg text-on-surface leading-relaxed mb-6">
                    A circle in the <em>xy</em>-plane has equation <code class="bg-surface-container px-2 py-1 rounded text-primary">(x - 3)<sup>2</sup> + (y + 5)<sup>2</sup> = 36</code>. Which of the following points lies on the circle?
                </p>
            </div>

            <!-- Options -->
            <div class="space-y-3">
                <label class="flex items-center gap-4 p-4 glass-card rounded-lg option-card cursor-pointer group hover:bg-surface-container transition-smooth">
                    <input type="radio" name="answer" class="radio-button" />
                    <span class="text-on-surface group-hover:text-primary transition-smooth">A &nbsp; &nbsp; (3, 1)</span>
                </label>

                <label class="flex items-center gap-4 p-4 glass-card rounded-lg option-card cursor-pointer selected group" style="border: 2px solid #4dd9cc; background: rgba(22, 25, 45, 0.8); box-shadow: 0 0 20px rgba(77, 217, 204, 0.15);">
                    <input type="radio" name="answer" class="radio-button" checked />
                    <span class="text-on-surface">B &nbsp; &nbsp; (-3, 5)</span>
                </label>

                <label class="flex items-center gap-4 p-4 glass-card rounded-lg option-card cursor-pointer group hover:bg-surface-container transition-smooth">
                    <input type="radio" name="answer" class="radio-button" />
                    <span class="text-on-surface group-hover:text-primary transition-smooth">C &nbsp; &nbsp; (0, 0)</span>
                </label>

                <label class="flex items-center gap-4 p-4 glass-card rounded-lg option-card cursor-pointer marked group hover:bg-surface-container transition-smooth" style="border-right: 4px solid #ffc857;">
                    <input type="radio" name="answer" class="radio-button" />
                    <span class="text-on-surface group-hover:text-primary transition-smooth">D &nbsp; &nbsp; (2, -5)</span>
                </label>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center justify-between gap-4 mb-8">
            <button class="btn-secondary px-8 py-3 rounded-lg">← Back</button>
            <div class="flex items-center gap-2">
                <button class="p-3 glass-card rounded-lg text-on-surface-variant hover:text-primary transition-smooth" title="Mark for review">
                    <span class="material-symbols-outlined">bookmark_outline</span>
                </button>
                <button class="p-3 glass-card rounded-lg text-on-surface-variant hover:text-secondary transition-smooth" title="Flag question">
                    <span class="material-symbols-outlined">flag_outline</span>
                </button>
            </div>
            <button class="btn-primary px-8 py-3 rounded-lg">Next →</button>
        </div>

        <!-- Question Navigator -->
        <div class="flex items-center gap-2 justify-center overflow-x-auto p-4 glass-card rounded-lg">
            <button class="w-8 h-8 flex items-center justify-center rounded text-xs font-bold bg-primary text-on-primary hover:shadow-lg transition-smooth">1</button>
            <button class="w-8 h-8 flex items-center justify-center rounded text-xs font-bold border border-primary text-primary hover:bg-primary/10 transition-smooth">2</button>
            <button class="w-8 h-8 flex items-center justify-center rounded text-xs font-bold border border-outline text-on-surface-variant hover:text-primary transition-smooth">3</button>
            <button class="w-8 h-8 flex items-center justify-center rounded text-xs font-bold border border-outline text-on-surface-variant hover:text-primary transition-smooth">4</button>
            <span class="text-on-surface-variant px-2">...</span>
            <button class="w-8 h-8 flex items-center justify-center rounded text-xs font-bold border border-outline text-on-surface-variant hover:text-primary transition-smooth">27</button>
        </div>

        <!-- Student Info Footer -->
        <div class="mt-8 text-center text-sm text-on-surface-variant">
            <p>Student Name</p>
        </div>
    </div>
</div>

<script>
    const radioButtons = document.querySelectorAll('input[type="radio"]');
    const optionCards = document.querySelectorAll('.option-card');

    radioButtons.forEach((radio, index) => {
        radio.addEventListener('change', () => {
            optionCards.forEach(card => {
                card.classList.remove('selected');
                card.style.border = '1px solid rgba(77, 217, 204, 0.15)';
                card.style.background = 'rgba(22, 25, 45, 0.45)';
                card.style.boxShadow = 'none';
            });
            optionCards[index].classList.add('selected');
            optionCards[index].style.border = '2px solid #4dd9cc';
            optionCards[index].style.background = 'rgba(22, 25, 45, 0.8)';
            optionCards[index].style.boxShadow = '0 0 20px rgba(77, 217, 204, 0.15)';
        });
    });
</script>
</body>
</html>
